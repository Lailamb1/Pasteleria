<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Receta</title>
</head>
<body>
    <header>
        <h1>Editar Receta</h1>
        <nav>
            <ul>
                <li><a href="{{ url_for('gestionar_recetas') }}">Volver a Gestionar Recetas</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <h2>Editar receta: {{ receta['nombre'] }}</h2>
        
        <!-- Formulario para editar -->
        <form method="POST">
            <label for="nombre">Nombre de la receta:</label>
            <input type="text" id="nombre" name="nombre" value="{{ receta['nombre'] }}" required>

            <label for="descripcion">Descripción:</label>
            <textarea id="descripcion" name="descripcion" required>{{ receta['descripcion'] }}</textarea>

            <button type="submit">Guardar cambios</button>
        </form>
    </main>
</body>
</html>
