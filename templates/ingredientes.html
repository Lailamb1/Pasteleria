<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Ingrediente</title>
</head>
<body>
    <h1>Agregar Ingrediente</h1>
    <form method="POST">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required><br><br>
        
        <label for="precio">Precio:</label>
        <input type="number" step="0.01" id="precio" name="precio" required><br><br>
        
        <label for="unidad">Unidad (kg, g, ml, etc.):</label>
        <input type="text" id="unidad" name="unidad" required><br><br>
        
        <button type="submit">Agregar</button>
    </form>
    <a href="{{ url_for('ver_ingredientes') }}">Ver Ingredientes</a>
</body>
</html>
