<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Ingredientes</title>
</head>
<body>
    <h1>Lista de Ingredientes</h1>
    <ul>
        {% for ingrediente in ingredientes %}
        <li>
            {{ ingrediente.nombre }} - {{ ingrediente.precio }} por {{ ingrediente.unidad }}
            <form action="{{ url_for('eliminar_ingrediente', id=ingrediente.id) }}" method="POST" style="display:inline;">
                <button type="submit" onclick="return confirm('¿Seguro que deseas eliminar este ingrediente?');">Eliminar</button>
            </form>
        </li>
        {% endfor %}
    </ul>
    <a href="{{ url_for('gestionar_ingredientes') }}">Agregar Ingrediente</a>
    <br>
    <a href="{{ url_for('home') }}">Volver al Inicio</a>
</body>
</html>
