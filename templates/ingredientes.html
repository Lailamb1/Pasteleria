<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Ingrediente</title>
</head>
<body>
    <h1>Agregar Ingrediente</h1>
    <form action="/add_ingrediente" method="POST">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required><br><br>
        
        <label for="costo_unitario">Costo unitario:</label>
        <input type="number" step="0.01" id="costo_unitario" name="costo_unitario" required><br><br>
        
        <label for="unidad">Unidad:</label>
        <input type="text" id="unidad" name="unidad" required><br><br>

        <label for="proveedor">Proveedor:</label>
        <input type="text" id="proveedor" name="proveedor" required><br><br>

        <button type="submit">Agregar Ingrediente</button>
    </form>
</body>
</html>
