<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Recetas</title>
</head>
<body>
    <header>
        <h1>Gestión de Recetas</h1>
        <nav>
            <ul>
                <li><a href="{{ url_for('home') }}">Volver al Inicio</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <h2>Añadir nueva receta</h2>
        <form method="POST" action="{{ url_for('gestionar_recetas') }}">
            <label for="titulo">Título:</label>
            <input type="text" id="titulo" name="titulo" required><br>

            <label for="ingredientes">Ingredientes:</label>
            <textarea id="ingredientes" name="ingredientes" required></textarea><br>

            <label for="instrucciones">Instrucciones:</label>
            <textarea id="instrucciones" name="instrucciones" required></textarea><br>

            <button type="submit">Agregar Receta</button>
        </form>

        <h2>Recetas Disponibles</h2>
        <table>
            <thead>
                <tr>
                    <th>Título</th>
                    <th>Ingredientes</th>
                    <th>Instrucciones</th>
                </tr>
            </thead>
            <tbody>
                {% for receta in recetas %}
                    <tr>
                        <td>{{ receta['titulo'] }}</td>
                        <td>{{ receta['ingredientes'] }}</td>
                        <td>{{ receta['instrucciones'] }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </main>
</body>
</html>
