<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Recetas</title>
    <!-- Puedes agregar una hoja de estilos externa o usar Bootstrap -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <header>
        <h1>Gestión de Recetas</h1>
        <nav>
            <ul>
                <li><a href="{{ url_for('home') }}">Volver al Inicio</a></li>
            </ul>
        </nav>
    </header>
    
    <main class="container mt-4">

        <!-- Formulario para agregar nueva receta -->
        <section>
            <h2>Agregar nueva receta</h2>
            <form action="{{ url_for('gestionar_recetas') }}" method="POST">
                <div class="form-group">
                    <label for="titulo">Título de la receta</label>
                    <input type="text" id="titulo" name="titulo" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="ingredientes">Ingredientes</label>
                    <textarea id="ingredientes" name="ingredientes" class="form-control" rows="5" required></textarea>
                </div>
                <div class="form-group">
                    <label for="instrucciones">Instrucciones</label>
                    <textarea id="instrucciones" name="instrucciones" class="form-control" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Agregar Receta</button>
            </form>
        </section>

        <hr>

        <!-- Lista de recetas -->
        <section>
            <h2>Recetas existentes</h2>
            <ul>
                <!-- Aquí se mostrarían las recetas ya guardadas -->
                {% for receta in recetas %}
                    <li>
                        <h3>{{ receta.titulo }}</h3>
                        <p><strong>Ingredientes:</strong> {{ receta.ingredientes }}</p>
                        <p><strong>Instrucciones:</strong> {{ receta.instrucciones }}</p>
                    </li>
                {% endfor %}
            </ul>
        </section>

    </main>
</body>
</html>
